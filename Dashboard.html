<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Painel</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>

<h1>Entregador PRO</h1>

</header>

<section class="cards">

<div class="card red">

<h3>Ganhos</h3>

<p id="ganhos">R$0</p>

</div>

<div class="card">

<h3>Entregas</h3>

<p id="entregas">0</p>

</div>

<div class="card">

<h3>KM Rodado</h3>

<p id="km">0</p>

</div>

<div class="card">

<h3>Lucro Líquido</h3>

<p id="lucro">R$0</p>

</div>

</section>

<section class="inputs">

<h2>Adicionar Entrega</h2>

<input id="valorEntrega">

<button onclick="addEntrega()">Adicionar</button>

<h2>Adicionar KM</h2>

<input id="kmRodado">

<button onclick="addKM()">Adicionar</button>

<h2>Registrar Combustível</h2>

<input id="combustivel">

<button onclick="addCombustivel()">Adicionar</button>

</section>

<script src="js/dashboard.js"></script>

</body>

</html>
